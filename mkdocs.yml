site_name: Homelab
site_description: Learn Platform Engineering by building a real homelab — Proxmox, GitOps, Kubernetes, and operations
site_author: Nasr Aldin
site_url: https://nasraldin.github.io/homelab/

repo_name: nasraldin/homelab
repo_url: https://github.com/nasraldin/homelab
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Nasr Aldin — Educational homelab guide

validation:
  nav:
    omitted_files: ignore
    not_found: ignore
  links:
    not_found: ignore
    unrecognized_links: ignore
    anchors: ignore

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nasraldin/homelab
    - icon: fontawesome/solid/globe
      link: https://nasraldin.com

