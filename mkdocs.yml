  - Home: index.md
  - Start here:
      - Current state: current-state.md
      - Build story: build-story.md
      - Platform tooling: platform-tooling.md
      - Using placeholders: conventions/placeholders.md
  - Roadmap:
      - Overview: roadmap/README.md
      - Foundation sequence: roadmap/foundation-sequence.md
      - Phase details: roadmap/phases.md
  - Installation:
      - Index: installation/README.md
      - Journey: installation/journey.md
      - Next steps: installation/next-steps.md
      - Issues tracker: installation/issues-tracker.md
      - Verified state: installation/verified-state.md
  - Architecture:
      - Hardware & storage: architecture/hardware-and-storage.md
      - Proxmox storage layout: architecture/proxmox-storage-layout.md
      - Service placement: architecture/service-placement.md
